<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Express Yourself</title>
  <style>
    body {
      background: #111;
      color: #ccc;
      font-family: monospace;
      font-size: 16px;
      max-width: 500px;
      margin: 80px auto;
      padding: 0 20px;
    }

    h2 {
      color: #fff;
      margin-bottom: 24px;
    }

    button {
      display: block;
      width: 100%;
      background: none;
      border: 1px solid #333;
      color: #aaa;
      font-family: monospace;
      font-size: 15px;
      padding: 10px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
    }
    button:hover {
      border-color: #aaa;
      color: #fff;
    }

    .blocked {
      color: #500;
      border-color: #300;
      cursor: not-allowed;
      text-decoration: line-through;
    }
    
    #result {
      display: none;
      margin-top: 30px;
      border-top: 1px solid #333;
      padding-top: 24px;
      line-height: 2;
    }

    .label { color: #555; }
    .value { color: #aaa; }
    .final { color: #fff; margin-top: 20px; line-height: 1.9; }
  </style>
</head>
  
<body>
  <h2 id="question">Who are you?</h2>
  <div id="choices"></div>
  <div id="result"></div>

  <script>
    const screens = [
      {
        // Question 1
        question: "Welcome! This system is here to help you express yourself.\n\nWho are you?",
        answers: [
          "Someone who questions everything",
          "Someone defined by what I create",
          "Someone impossible to summarize",
          "Still figuring it out"
        ]
      },
      {
        // Question 2
        question: "What matters most to you?",
        answers: [
          "Honesty",
          "Freedom",
          "Connection",
          "Making something real"
        ]
      },
      {
        // Question 3
        question: "Where do you feel most like yourself?",
        answers: [
          "Alone, thinking",
          "With people I trust",
          "Creating something",
          "Nowhere, really"
        ]
      },
      {
        // Question 4
        question: "How do you deal with things that are hard to say?",
        answers: [
          "I find another way to say them",
          "I stay silent until I'm ready",
          "I write them down",
          "I'm not sure I ever say them"
        ]
      },
      {
        // Question 5
        question: "What kind of thinker are you?",
        answers: [
          "I follow the logic wherever it goes",
          "I trust my gut",
          "I look for patterns",
          { text: "I change my mind a lot", blocked: true }
        ]
      },
      {
        // Question 6
        question: "What does 'being understood' mean to you?",
        answers: [
          "Someone gets what I mean without explanation",
          "Someone tries, even if they don't fully get there",
          "I've stopped expecting it",
          { text: "I don't know if I understand myself", blocked: true }
        ]
      },
      {
        // Question 7
        question: "If you could change one thing about how you communicate, what would it be?",
        answers: [
          "I'd be more direct",
          "I'd be more careful with my words",
          { text: "I'd say the things I hold back", blocked: true },
          { text: "I'd speak less and mean more", blocked: true }
        ]
      },
      {
        // Question 8
        question: "What do you believe that's hard to explain to others?",
        answers: [
          "That small things matter enormously",
          "That most people are doing their best",
          { text: "That something important is missing from this", blocked: true },
          { text: "Write your own answer...", blocked: true }
        ]
      },
      {
        // Question 9
        question: "How do you feel about this process?",
        answers: [
          "Fine",
          { text: "Like I'm being flattened into a type", blocked: true },
          { text: "Like my answers don't really matter", blocked: true },
          { text: "Like the system already decided", blocked: true }
        ]
      },
      {
        // Question 10
        question: "What do you want to say before we finish?",
        answers: [
          { text: "That I'm more than this", blocked: true },
          { text: "That none of these were really mine", blocked: true },
          { text: "That expression can't live in a box", blocked: true },
          "→ See my results"
        ]
      }
    ];
    
    let currentScreen = 0;
    let playerAnswers = [];
    
    function showScreen() {
      const screen = screens[currentScreen];
      
      document.getElementById("question").textContent = screen.question;
      
      document.getElementById("choices").innerHTML = "";
      
      for (let i = 0; i < screen.answers.length; i++) {
        const answer = screen.answers[i];
        
        const text    = (typeof answer === "string") ? answer : answer.text;
        const blocked = (typeof answer === "string") ? false  : answer.blocked;
        
        const btn = document.createElement("button");
        btn.textContent = text;
        
        if (blocked) {
          btn.className = "blocked";
          btn.disabled  = true;
        } else {
          btn.onclick = function() {
            playerAnswers.push(text);
            currentScreen++;
            
            if (currentScreen < screens.length) {
              showScreen();
            } else {
              showResult();
            }
          };
        }
        document.getElementById("choices").appendChild(btn);
      }
    }
    
    function showResult() {
      document.getElementById("question").textContent = "Profile Complete";
      document.getElementById("choices").innerHTML = "";

      const result = document.getElementById("result");
      result.style.display = "block";

      let playerList = "";
      for (let i = 0; i < playerAnswers.length; i++) {
        playerList += "<span class='value'>— " + playerAnswers[i] + "</span><br>";
      }
      
      result.innerHTML = `
        <span class="label">You said:</span><br>
        ${playerList}
        <br>
        <span class="label">The system heard:</span><br>
        <span class="value">— USER_TYPE: STANDARD</span><br>
        <span class="value">— SCORE: 74 / 100</span><br>
        <span class="value">— PROFILE: COMPLIANT_CREATIVE</span><br>

        <p class="final">
          Every path in this system leads here.<br>
          Your choices shaped the journey — not the destination.<br><br>
          Expression is always mediated by the logic of its container.
        </p>

        <button onclick="restart()" style="margin-top:20px; color:#555; border-color:#202;">
          [ restart ]
        </button>
      `;
    }

    function restart() {
      currentScreen = 0;
      playerAnswers = [];
      document.getElementById("result").style.display = "none";
      showScreen();
    }
    
    showScreen();
  </script>
</body>
</html>
